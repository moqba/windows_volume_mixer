<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Volume Mixer</title>

<style>
html, body {
    height: 100%;
    margin: 0;
    font-family: sans-serif;
    background: #121212;
    color: white;
}

body {
    display: flex;
    justify-content: center;
    align-items: center;
}

.mixer-container {
    display: flex;
    gap: 5vw;
    width: 90vw;
    height: 95vh;
    align-items: stretch;
}

.channel {
    display: flex;
    flex-direction: column;
    align-items: center;
    flex: 1;
    transition: opacity 0.3s ease;
}

.channel.inactive {
    opacity: 0.35;
}

.channel.inactive input[type=range] {
    pointer-events: none;
}

.channel.inactive .value-display {
    color: #777;
}

/* ---------- ICON ---------- */
.icon-container {
    width: 56px;
    height: 56px;
    margin-bottom: 12px;
    display: flex;
    justify-content: center;
    align-items: center;
}

.icon-img {
    width: 100%;
    height: 100%;
    object-fit: contain;
}

.icon-fallback {
    width: 100%;
    height: 100%;
    border-radius: 50%;
    background: #2a2a2a;
    display: flex;
    justify-content: center;
    align-items: center;
    font-weight: bold;
    font-size: 1.5rem;
    text-transform: uppercase;
    color: #1DB954;
}

/* Gray-out icon when inactive */
.channel.inactive .icon-img,
.channel.inactive .icon-fallback {
    filter: grayscale(100%) brightness(0.6);
    opacity: 0.6;
}

/* ---------- SLIDER ---------- */
.slider-wrapper {
    flex-grow: 1;
    display: flex;
    align-items: stretch;
}

input[type=range] {
    writing-mode: bt-lr;
    appearance: slider-vertical;
    width: 12px;
    height: 100%;
}

input[type=range]:disabled {
    cursor: not-allowed;
}

.label {
    font-weight: bold;
    text-transform: uppercase;
    font-size: 1rem;
    letter-spacing: 1px;
    margin: 5px 0;
}

.value-display {
    color: #1DB954;
    font-family: monospace;
    font-size: 1rem;
    margin-bottom: 5px;
}
</style>
</head>

<body>

<div class="mixer-container">

    <div class="channel inactive" id="game-container">
        <div class="icon-container" id="game-icon"></div>
        <div class="slider-wrapper">
            <input type="range" id="game-slider" min="0" max="1" step="0.01" disabled>
        </div>
        <div class="value-display" id="game-val">--</div>
        <div class="label">Game</div>
    </div>

    <div class="channel inactive" id="spotify-container">
        <div class="icon-container" id="spotify-icon"></div>
        <div class="slider-wrapper">
            <input type="range" id="spotify-slider" min="0" max="1" step="0.01" disabled>
        </div>
        <div class="value-display" id="spotify-val">--</div>
        <div class="label">Spotify</div>
    </div>

    <div class="channel inactive" id="chrome-container">
        <div class="icon-container" id="chrome-icon"></div>
        <div class="slider-wrapper">
            <input type="range" id="chrome-slider" min="0" max="1" step="0.01" disabled>
        </div>
        <div class="value-display" id="chrome-val">--</div>
        <div class="label">Chrome</div>
    </div>

    <div class="channel inactive" id="discord-container">
        <div class="icon-container" id="discord-icon"></div>
        <div class="slider-wrapper">
            <input type="range" id="discord-slider" min="0" max="1" step="0.01" disabled>
        </div>
        <div class="value-display" id="discord-val">--</div>
        <div class="label">Discord</div>
    </div>

</div>

<script>
const apps = ['game', 'spotify', 'chrome', 'discord'];

/* ---------- ICON HANDLING ---------- */
function createFallbackIcon(app) {
    const div = document.createElement('div');
    div.className = 'icon-fallback';
    div.innerText = app[0];
    return div;
}

function blobToBase64(blob) {
    return new Promise(resolve => {
        const reader = new FileReader();
        reader.onloadend = () => resolve(reader.result);
        reader.readAsDataURL(blob);
    });
}

function tryLoadIcon(app) {
    const host = window.location.hostname;
    const container = document.getElementById(`${app}-icon`);
    const cacheKey = `icon-cache-${app}`;

    const cached = localStorage.getItem(cacheKey);
    if (cached) {
        const img = document.createElement('img');
        img.src = cached;
        img.className = 'icon-img';
        container.innerHTML = '';
        container.appendChild(img);
        return;
    }

    container.innerHTML = '';
    container.appendChild(createFallbackIcon(app));

    async function fetchIcon() {
        try {
            const res = await fetch(`http://${host}:51000/icon/${app}`);
            if (!res.ok) throw new Error();

            const blob = await res.blob();
            const base64 = await blobToBase64(blob);

            localStorage.setItem(cacheKey, base64);

            const img = document.createElement('img');
            img.src = base64;
            img.className = 'icon-img';

            container.innerHTML = '';
            container.appendChild(img);

            return true;
        } catch {
            return false;
        }
    }

    const interval = setInterval(async () => {
        const success = await fetchIcon();
        if (success) clearInterval(interval);
    }, 5000);
}

/* ---------- SSE / VOLUME ---------- */
apps.forEach(app => {
    const slider = document.getElementById(`${app}-slider`);
    const display = document.getElementById(`${app}-val`);
    const channel = document.getElementById(`${app}-container`);

    let eventSource = null;
    let connected = false;
    let reconnectTimer = null;

    function setInactive() {
        channel.classList.add('inactive');
        slider.disabled = true;
        display.innerText = '--';
        connected = false;
    }

    function setActive() {
        channel.classList.remove('inactive');
        slider.disabled = false;
        connected = true;
    }

    function connectSSE() {
        if (eventSource) eventSource.close();

        const host = window.location.hostname;
        eventSource = new EventSource(`http://${host}:51000/volume/${app}`);

        eventSource.onmessage = (event) => {
            const value = parseFloat(event.data);
            if (isNaN(value)) return;

            if (!connected) setActive();

            if (document.activeElement !== slider) {
                slider.value = value;
                display.innerText = value.toFixed(2);
            }
        };

        eventSource.onerror = () => {
            eventSource.close();
            eventSource = null;

            if (connected) setInactive();

            if (!reconnectTimer) {
                reconnectTimer = setTimeout(() => {
                    reconnectTimer = null;
                    connectSSE();
                }, 2000);
            }
        };
    }

    setInactive();
    connectSSE();
    tryLoadIcon(app);

    slider.addEventListener('input', () => {
        const value = parseFloat(slider.value);
        display.innerText = value.toFixed(2);
        updateVolume(app, value);
    });
});

async function updateVolume(app, value) {
    try {
        const host = window.location.hostname;
        await fetch(`http://${host}:51000/set-volume`, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ app, value })
        });
    } catch (err) {
        console.error('Failed to update volume:', err);
    }
}
</script>

</body>
</html>
