<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Volume Mixer</title>

    <link rel="stylesheet" href="/static/css/mixer.css">
</head>

<body>

<div class="mixer-container">
    {% for slider in sliders %}
    <div class="channel inactive" id="{{ slider }}-container">
        <div class="icon-container" id="{{ slider }}-icon">
            <div class="icon-fallback">{{ slider[0]|upper }}</div>
        </div>

        <div class="slider-wrapper">
            <input
                type="range"
                id="{{ slider }}-slider"
                min="0"
                max="1"
                step="0.01"
                disabled
            >
        </div>

        <div class="value-display" id="{{ slider }}-val">--</div>
        <div class="label">{{ slider | capitalize }}</div>
    </div>
    {% endfor %}
</div>

<script>
    window.MQ_CONFIG = {
        port: {{ port }},
        sliders: {{ sliders | tojson }}
    };
</script>

<script src="/static/js/mixer.js" defer></script>
</body>
</html>
